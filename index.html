<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Too Many Items v13</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="tiny">nAVI</div>
      <h1>TOO MANY ITEMS</h1>
    </div>

    <nav class="nav">
      <button>inventory</button>
      <button>bulk add</button>
      <button>locations</button>
      <button>database</button>
      <button>settings</button>
    </nav>

    <section class="db-state">
      <div class="state-row"><span>database</span><strong>inventory.db</strong></div>
      <div class="state-row"><span>state</span><strong>saved</strong></div>
      <div class="state-row"><span>source</span><strong>github</strong></div>
      <div class="state-row"><span>parts</span><strong>203</strong></div>
      <div class="state-row"><span>stock</span><strong>9633</strong></div>
      <div class="state-row"><span>theme</span><strong>angel cloud</strong></div>
    </section>
  </aside>

  <main class="main">
    <header class="header">
      <div>
        <div class="path">inventory / parts</div>
        <h2>parts</h2>
      </div>
    </header>

    <section class="toolbar">
      <input placeholder="search parts">
      <select>
        <option>all categories</option>
      </select>
      <select>
        <option>sort: quantity</option>
      </select>
      <button>bulk add</button>
      <button>add part</button>
      <button>export</button>
    </section>

    <section class="metrics">
      <div class="metric"><strong>203</strong><span>parts</span></div>
      <div class="metric"><strong>9633</strong><span>items</span></div>
      <div class="metric"><strong>1</strong><span>locations</span></div>
      <div class="metric"><strong>0</strong><span>low stock</span></div>
    </section>

    <section class="table-card">
      <table>
        <thead>
          <tr>
            <th>part</th>
            <th>category</th>
            <th>pkg</th>
            <th>qty</th>
            <th>location</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>
</div>

<script src="js/app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>zeroCountersteer Inventory</title>
  <meta name="description" content="Static GitHub-backed SQLite inventory." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23f6f9fc'/%3E%3Cpath d='M8 9h16v4H8zM8 15h16v4H8zM8 21h10v4H8z' fill='%23586f95'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css?v=250" />
</head>
<body class="no-motion" data-app-ready="false">
  <div class="app-shell">
    <aside class="navi-card" aria-label="Navigation">
      <div class="navi-head">
        <div>
          <p class="eyebrow">owner</p>
          <h1 id="ownerHeader">zeroCountersteer</h1>
        </div>
      </div>

      <nav class="navi-menu" id="navMenu">
        <button type="button" class="nav-button" data-view="parts">Inventory</button>
        <button type="button" class="nav-button" data-view="projects">Projects</button>
        <button type="button" class="nav-button" data-view="locations">Locations</button>
        <button type="button" class="nav-button" data-view="database">Reports</button>
        <button type="button" class="nav-button" data-view="settings">Settings</button>
      </nav>

      <div class="panel connection-panel db-status-panel">
        <p class="panel-title">database</p>
        <p id="navDbName">inventory.db</p>
        <p id="navDbState" class="muted">initializing</p>
        <div id="navDbDetails" class="db-state-grid"></div>
      </div>
    </aside>

    <main class="main-window" aria-live="polite">
      <header class="window-chrome">
        <div>
          <p class="path-line" id="pathLine">INVENTORY / PARTS</p>
          <h2 id="windowTitle">electronic components</h2>
        </div>
      </header>

      <section class="notice-line" id="noticeLine" hidden></section>

      <section class="content-card" id="viewPanel"></section>
    </main>

  </div>

  <input id="dbFileInput" type="file" accept=".db,.sqlite,.sqlite3,application/octet-stream,application/vnd.sqlite3" hidden />
  <input id="jsonFileInput" type="file" accept="application/json,.json" hidden />
  <input id="themeFileInput" type="file" accept="application/json,.json" multiple hidden />
  <div id="modalRoot"></div>

  <noscript>
    <div class="noscript">This inventory app requires JavaScript. It does not use a backend.</div>
  </noscript>

  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>
  <script src="js/00-config.js?v=250"></script>
  <script src="js/06-inventory-model.js?v=250"></script>
  <script src="js/05-database.js?v=250"></script>
  <script src="js/07-theme-utils.js?v=250"></script>
  <script src="js/02-render.js?v=250"></script>
  <script src="js/04-editors.js?v=250"></script>
  <script src="js/03-bulk-and-api.js?v=250"></script>
  <script src="js/08-project-editor.js?v=250"></script>
  <script src="js/01-core-events.js?v=250"></script>
  <script>if ("serviceWorker" in navigator) { window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(console.warn)); }</script>
</body>
</html>
